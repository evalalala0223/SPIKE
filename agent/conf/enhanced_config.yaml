features:
  use_langchain: false
  use_langgraph: true
  use_mem0: false
  use_dual_brain: true
  use_mcp: false

performance:
  llm_endpoint_throttle:
    enabled: false
    max_concurrency: 1
    model_name_substrings:
      - qwen
    slot_dir: cache/locks/llm_endpoint_slots
    timeout_s: 180
  streaming:
    enabled: false
  video:
    record_only_when_focused: true

logging:
  enhanced_features: false
  gating_decisions: false
  memory_debug: false
  performance_metrics: false
